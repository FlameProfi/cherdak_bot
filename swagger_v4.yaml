openapi: 3.0.0
info:
  title: 'FUSIONPOS Api'
  description: 'Апи для 4 версии проекта'
  version: '1.0'
servers:
  -
    url: '{domain}api/v1/'
    description: 'Ваш домен'
    variables:
      domain:
        default: 'https://my-domain.fusionpos.ru/'
paths:
  /departments:
    get:
      tags:
        - Department
      summary: 'Список отделов'
      description: 'Минимальная роль: авторизованный пользователь. Поддерживает фильтрацию, сортировку и пагинацию.'
      operationId: c157d659a62b40a78bdeaba1293bcff4
      parameters:
        -
          name: search
          in: query
          description: 'Общий поиск по названию'
          schema:
            type: string
        -
          name: is_deleted
          in: query
          description: 'Фильтр по удалённым (`true` / `false`)'
          schema:
            type: string
            default: 'false'
            enum:
              - ''
              - 'true'
              - 'false'
        -
          name: pagination
          in: query
          description: 'Пагинация (`false` — вернуть все)'
          schema:
            type: string
            default: 'true'
            enum:
              - 'true'
              - 'false'
        -
          name: sort
          in: query
          description: 'Поле сортировки, префикс `-` для DESC'
          schema:
            type: string
          examples:
            name:
              summary: name
              value: name
            '-name':
              summary: '-name'
              value: '-name'
            created_at:
              summary: created_at
              value: created_at
            '-created_at':
              summary: '-created_at'
              value: '-created_at'
        -
          name: page
          in: query
          schema:
            type: integer
            default: 1
        -
          name: per-page
          in: query
          schema:
            type: integer
            default: 25
        -
          name: expand
          in: query
          description: 'Доступно: `createdBy`, `show_expand`'
          schema:
            type: string
            example: createdBy
        -
          name: id
          in: query
          description: 'Фильтр по ID'
          schema:
            type: integer
        -
          name: name
          in: query
          description: 'Фильтр по названию (LIKE)'
          schema:
            type: string
        -
          name: created_by
          in: query
          schema:
            type: integer
        -
          name: created_at_start
          in: query
          description: 'Фильтр: дата создания от (Y-m-d H:i:s)'
          schema:
            type: string
            format: date-time
            example: '2026-01-01 00:00:00'
        -
          name: created_at_end
          in: query
          description: 'Фильтр: дата создания до (Y-m-d H:i:s)'
          schema:
            type: string
            format: date-time
            example: '2026-12-31 23:59:59'
        -
          name: updated_at_start
          in: query
          description: 'Фильтр: дата обновления от (Y-m-d H:i:s)'
          schema:
            type: string
            format: date-time
            example: '2026-01-01 00:00:00'
        -
          name: updated_at_end
          in: query
          description: 'Фильтр: дата обновления до (Y-m-d H:i:s)'
          schema:
            type: string
            format: date-time
            example: '2026-12-31 23:59:59'
        -
          name: deleted_at_start
          in: query
          description: 'Фильтр: дата удаления от (Y-m-d H:i:s)'
          schema:
            type: string
            format: date-time
            example: '2026-01-01 00:00:00'
        -
          name: deleted_at_end
          in: query
          description: 'Фильтр: дата удаления до (Y-m-d H:i:s)'
          schema:
            type: string
            format: date-time
            example: '2026-12-31 23:59:59'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/DepartmentView' } }
                  _meta: { properties: { totalCount: { type: integer, example: 42 }, pageCount: { type: integer, example: 3 }, currentPage: { type: integer, example: 1 }, perPage: { type: integer, example: 20 } }, type: object }
                type: object
        '401':
          description: 'Не авторизован'
        '403':
          description: 'Доступ запрещён'
        '404':
          description: 'Не найдено'
        '406':
          description: 'Ошибка процесса сохранения'
        '422':
          description: 'Ошибка валидации'
        '500':
          description: 'Ошибка сервера'
      security:
        -
          bearerAuth: []
    post:
      tags:
        - Department
      summary: Создать
      description: 'Минимальная роль: menuUpdate'
      operationId: 88e74d16f3e937b14984bfec8c22c0c0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentUpdate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartmentView'
        '401':
          description: 'Не авторизован'
        '403':
          description: 'Доступ запрещён'
        '404':
          description: 'Не найдено'
        '406':
          description: 'Ошибка процесса сохранения'
        '422':
          description: 'Ошибка валидации'
        '500':
          description: 'Ошибка сервера'
      security:
        -
          bearerAuth: []
